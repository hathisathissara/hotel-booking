<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hotel Management - Home</title>
   <link rel="stylesheet" href="css/style.css">
   <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>

    <!-- Navigation Bar -->
    <div class="navbar">
        <a href="/">Home</a>
        <a href="/login">Login</a>
        <a href="/register">Register</a>
        <a href="#" id="logoutBtn" style="display:none; color: #ff4c4c;">Logout</a>
    </div>

    <!-- Header Section -->
    <div class="header">
        <h1>Welcome to Our Luxury Hotel</h1>
        <p>Find the best rooms for your stay</p>
    </div>

    <!-- Date Filter Section -->
    <div style="text-align: center; margin: 20px; padding: 20px; background: white; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); max-width: 800px; margin-left: auto; margin-right: auto;">
        <h3>Find Available Rooms</h3>
        <form id="searchForm" style="display: flex; justify-content: center; gap: 15px; flex-wrap: wrap; align-items: center;">
            <div>
                <label>Check-in:</label>
                <input type="date" id="search_check_in" required style="padding: 8px; border-radius: 4px; border: 1px solid #ccc;">
            </div>
            <div>
                <label>Check-out:</label>
                <input type="date" id="search_check_out" required style="padding: 8px; border-radius: 4px; border: 1px solid #ccc;">
            </div>
            <button type="submit" class="book-btn" id="searchBtn" style="margin-top: 20px;">Search</button>
        </form>
    </div>

    <!-- Me div eka athulata thama JS walin rooms tika load wenne -->
    <div class="rooms-container" id="roomsContainer">
        <h2>Loading rooms...</h2>
    </div>
 <!-- ================= BOOKING MODAL (Pop-up) ================= -->
    <div id="bookingModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" id="closeModal">&times;</span>
            <h2>Book Your Room</h2>
            <form id="bookingForm">
                <!-- Room ID eka hangala thiyaganna -->
                <input type="hidden" id="modal_room_id">
                
                <label>Check-In Date:</label>
                <input type="date" id="check_in" required>
                
                <label>Check-Out Date:</label>
                <input type="date" id="check_out" required>
                
                <button type="submit" class="book-btn" style="width:100%; margin-top: 15px;">Confirm Booking</button>
            </form>
            <div id="bookingMessage" class="message-box"></div>
        </div>
    </div>
    <!-- Footer Section -->
    <footer style="background-color: #333; color: white; text-align: center; padding: 20px; margin-top: 40px;">
        <p>&copy; 2026 Luxury Hotel Management. All rights reserved.</p>
        <p>Email: contact@luxuryhotel.com | Phone: +94 77 123 4567</p>
        <p>123 Ocean Drive, Colombo, Sri Lanka</p>
    </footer>

    <script src="js/common.js"></script>
    <script src="js/home.js"></script>
</body>
</html>
