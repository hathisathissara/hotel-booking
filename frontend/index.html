<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumière Hotel — Luxury Stay</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root {
            --navy: #0d1b2a;
            --navy-mid: #1a2e45;
            --gold: #c9a84c;
            --gold-light: #e8c97e;
            --cream: #f9f5ee;
            --text-muted-custom: #8a9ab0;
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--cream);
            color: var(--navy);
            margin: 0;
        }

       

        /* ── Hero ── */
        .hero {
            background: linear-gradient(160deg, var(--navy) 0%, var(--navy-mid) 60%, #1e3a5f 100%);
            padding: 6rem 2rem 5rem;
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        .hero::before {
            content: '';
            position: absolute;
            inset: 0;
            background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23c9a84c' fill-opacity='0.04'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
        }
        .hero-eyebrow {
            font-size: 0.75rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: var(--gold);
            font-weight: 500;
            margin-bottom: 1rem;
        }
        .hero h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(2.5rem, 6vw, 4.5rem);
            color: #fff;
            font-weight: 700;
            line-height: 1.1;
            margin-bottom: 1.25rem;
        }
        .hero-sub {
            color: var(--text-muted-custom);
            font-size: 1.1rem;
            max-width: 480px;
            margin: 0 auto 2rem;
        }
        .hero-divider {
            width: 60px;
            height: 2px;
            background: var(--gold);
            margin: 0 auto 2.5rem;
        }

        /* ── Search Card ── */
        .search-card {
            background: white;
            border-radius: 16px;
            padding: 2rem;
            box-shadow: 0 20px 60px rgba(0,0,0,0.12);
            border: 1px solid rgba(201, 168, 76, 0.1);
            max-width: 860px;
            margin: -3rem auto 3rem;
            position: relative;
            z-index: 10;
        }
        .search-card h5 {
            font-family: 'Playfair Display', serif;
            font-size: 1.1rem;
            color: var(--navy);
            margin-bottom: 1.25rem;
        }
        .search-card .form-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted-custom);
            font-weight: 500;
        }
        .search-card .form-control,
        .search-card .form-select {
            border: 1.5px solid #e2e8f0;
            border-radius: 8px;
            padding: 0.65rem 0.9rem;
            font-size: 0.9rem;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .search-card .form-control:focus,
        .search-card .form-select:focus {
            border-color: var(--gold);
            box-shadow: 0 0 0 3px rgba(201,168,76,0.15);
        }

        /* ── Buttons ── */
        .btn-gold {
            background: var(--gold);
            color: var(--navy);
            border: none;
            font-weight: 600;
            font-size: 0.875rem;
            letter-spacing: 0.5px;
            border-radius: 8px;
            padding: 0.7rem 1.8rem;
            transition: background 0.2s, transform 0.15s;
        }
        .btn-gold:hover {
            background: var(--gold-light);
            color: var(--navy);
            transform: translateY(-1px);
        }
        .btn-outline-navy {
            background: transparent;
            color: var(--navy);
            border: 1.5px solid var(--navy-mid);
            font-weight: 500;
            font-size: 0.875rem;
            border-radius: 8px;
            padding: 0.65rem 1.4rem;
            transition: all 0.2s;
        }
        .btn-outline-navy:hover {
            background: var(--navy);
            color: white;
        }
        .btn-teal {
            background: #0ea5c2;
            color: white;
            border: none;
            font-weight: 500;
            font-size: 0.875rem;
            border-radius: 8px;
            padding: 0.65rem 1.2rem;
            transition: background 0.2s;
        }
        .btn-teal:hover { background: #0c8faa; color: white; }

        /* ── Rooms Section ── */
        .section-label {
            font-size: 0.7rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: var(--gold);
            font-weight: 600;
        }
        .section-title {
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            color: var(--navy);
            margin-bottom: 0.5rem;
        }

        /* ── Room Card ── */
        .room-card {
            background: white;
            border-radius: 14px;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0,0,0,0.07);
            border: 1px solid #eef0f4;
            transition: transform 0.25s, box-shadow 0.25s;
            height: 100%;
            display: flex;
            flex-direction: column;
        }
        .room-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 16px 40px rgba(0,0,0,0.12);
        }
        .room-card img {
            width: 100%;
            height: 220px;
            object-fit: cover;
        }
        .room-card-body {
            padding: 1.5rem;
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        .room-badge {
            display: inline-block;
            font-size: 0.7rem;
            font-weight: 600;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            background: rgba(201,168,76,0.12);
            color: var(--gold);
            border-radius: 4px;
            padding: 3px 10px;
            margin-bottom: 0.75rem;
        }
        .room-card h5 {
            font-family: 'Playfair Display', serif;
            font-size: 1.2rem;
            color: var(--navy);
            margin-bottom: 0.5rem;
        }
        .room-card p {
            font-size: 0.875rem;
            color: #64748b;
            flex: 1;
            margin-bottom: 1rem;
        }
        .room-price {
            font-family: 'Playfair Display', serif;
            font-size: 1.35rem;
            color: var(--navy);
            font-weight: 700;
        }
        .room-price span {
            font-family: 'DM Sans', sans-serif;
            font-size: 0.8rem;
            color: var(--text-muted-custom);
            font-weight: 400;
        }

        /* ── Modal ── */
        .modal-content {
            border-radius: 16px;
            border: none;
            box-shadow: 0 30px 80px rgba(0,0,0,0.2);
        }
        .modal-header {
            background: var(--navy);
            color: white;
            border-radius: 16px 16px 0 0;
            padding: 1.5rem;
            border: none;
        }
        .modal-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.3rem;
        }
        .modal-header .btn-close { filter: invert(1); }
        .modal-body { padding: 2rem; }

       

        /* Animations */
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .fade-up { animation: fadeUp 0.5s ease both; }
        .fade-up-2 { animation: fadeUp 0.5s 0.1s ease both; }
        .fade-up-3 { animation: fadeUp 0.5s 0.2s ease both; }
    </style>
</head>
<body>

<!-- Header Placeholder -->
<div id="header-placeholder"></div>

<!-- Hero -->
<div class="hero">
    <p class="hero-eyebrow fade-up">Colombo, Sri Lanka</p>
    <h1 class="fade-up-2">Where Luxury<br>Meets Comfort</h1>
    <div class="hero-divider fade-up-3"></div>
    <p class="hero-sub fade-up-3">Experience world-class hospitality at Sri Lanka's premier ocean-front property.</p>
</div>

<!-- Search Card -->
<div class="container">
    <div class="search-card">
        <h5><i class="bi bi-search me-2" style="color:var(--gold);"></i>Find Your Perfect Room</h5>
        <form id="searchForm">
            <div class="row g-3 align-items-end">
                <div class="col-md-3 col-6">
                    <label class="form-label">Check-in</label>
                    <input type="date" id="search_check_in" class="form-control">
                </div>
                <div class="col-md-3 col-6">
                    <label class="form-label">Check-out</label>
                    <input type="date" id="search_check_out" class="form-control">
                </div>
                <div class="col-md-2 col-6">
                    <label class="form-label">Room Type</label>
                    <select id="search_room_type" class="form-select">
                        <option value="">Any</option>
                        <option value="Single">Single</option>
                        <option value="Double">Double</option>
                        <option value="Family">Family</option>
                        <option value="Suite">Suite</option>
                    </select>
                </div>
                <div class="col-md-2 col-6">
                    <label class="form-label">Max Price (LKR)</label>
                    <input type="number" id="search_max_price" placeholder="e.g. 50000" class="form-control">
                </div>
                <div class="col-md-2">
                    <button type="submit" class="btn btn-gold w-100 py-2">
                        <i class="bi bi-search me-1"></i> Search
                    </button>
                </div>
            </div>
        </form>
    </div>
</div>

<!-- Rooms Section -->
<div class="container pb-5">
    <div class="text-center mb-4">
        <p class="section-label">Our Collection</p>
        <h2 class="section-title">Available Rooms</h2>
    </div>
    <div id="roomsContainer" class="row g-4">
        <div class="col-12 text-center py-5">
            <div class="spinner-border text-warning" role="status"></div>
            <p class="mt-2 text-muted">Loading rooms...</p>
        </div>
    </div>
</div>

<!-- Booking Modal -->
<div class="modal fade" id="bookingModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title"><i class="bi bi-calendar-check me-2"></i>Reserve Your Room</h5>
                <button type="button" class="btn-close" id="closeModal" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="bookingForm">
                    <input type="hidden" id="modal_room_id">
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Check-In Date</label>
                        <input type="date" id="check_in" class="form-control" required>
                    </div>
                    <div class="mb-4">
                        <label class="form-label fw-semibold">Check-Out Date</label>
                        <input type="date" id="check_out" class="form-control" required>
                    </div>
                    <button type="submit" class="btn btn-gold w-100 py-2">
                        <i class="bi bi-check2-circle me-2"></i>Confirm Booking
                    </button>
                </form>
                <div id="bookingMessage" class="mt-3"></div>
            </div>
        </div>
    </div>
</div>

<!-- Reviews Modal -->
<div class="modal fade" id="reviewsModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title"><i class="bi bi-star me-2"></i>Guest Reviews</h5>
                <button type="button" class="btn-close" id="closeReviewsModal" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <div id="reviewsList" style="max-height: 360px; overflow-y: auto;">
                    <p class="text-muted">Loading reviews...</p>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Footer Placeholder -->
<div id="footer-placeholder"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/common.js"></script>
<script src="js/script.js"></script>
</body>
</html>
