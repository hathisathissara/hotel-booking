<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hotel Management - Login</title>
    <link rel="stylesheet" href="css/login.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>

    <div class="container">
        <h2>User Login</h2>
        
        <form id="loginForm">
            <label>Email Address:</label>
            <input type="email" id="login_email" required>

            <label>Password:</label>
            <input type="password" id="login_password" required>

            <button type="submit">Login</button>
        </form>

        <div id="loginMessage"></div>
        <p style="text-align: center; margin-top: 20px;">Don't have an account? <a href="/register">Register</a></p>
    </div>

    <!-- Footer Section -->
    <footer style="background-color: #333; color: white; text-align: center; padding: 20px; margin-top: 40px;">
        <p>&copy; 2026 Luxury Hotel Management. All rights reserved.</p>
        <p>Email: contact@luxuryhotel.com | Phone: +94 77 123 4567</p>
        <p>123 Ocean Drive, Colombo, Sri Lanka</p>
    </footer>

    <script src="js/common.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
