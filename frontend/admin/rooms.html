<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumière Hotel — Manage Rooms</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root {
            --navy-dark: #080f1a;
            --navy-sidebar: #0b1528;
            --navy-card: #ffffff;
            --gold: #c9a84c;
            --gold-light: #f5e3b5;
            --gold-hover: #b3923b;
            --bg-workspace: #f8fafc;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border-color: #e2e8f0;
            --font-display: 'Playfair Display', serif;
            --font-sans: 'Plus Jakarta Sans', sans-serif;
            --transition-smooth: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body {
            font-family: var(--font-sans);
            background-color: var(--bg-workspace);
            color: var(--text-main);
            margin: 0;
            overflow-x: hidden;
        }

        /* Dashboard Wrapper */
        .dashboard-container {
            display: flex;
            min-height: 100vh;
        }

        /* Sidebar Styling */
        .sidebar {
            width: 270px;
            background-color: var(--navy-sidebar);
            border-right: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            flex-direction: column;
            position: fixed;
            top: 0;
            bottom: 0;
            left: 0;
            z-index: 100;
            transition: var(--transition-smooth);
        }

        .sidebar-brand {
            padding: 2rem 1.5rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .brand-icon {
            width: 38px;
            height: 38px;
            background: rgba(201, 168, 76, 0.12);
            border: 1px solid rgba(201, 168, 76, 0.3);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--gold);
            font-size: 1.1rem;
        }

        .brand-text {
            font-family: var(--font-display);
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--gold);
            letter-spacing: 0.5px;
        }

        .sidebar-nav {
            padding: 1.5rem 1rem;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .nav-link-custom {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 0.8rem 1rem;
            color: #94a3b8;
            font-weight: 500;
            font-size: 0.92rem;
            border-radius: 10px;
            text-decoration: none;
            transition: var(--transition-smooth);
        }

        .nav-link-custom:hover {
            color: white;
            background-color: rgba(255, 255, 255, 0.03);
        }

        .nav-link-custom.active {
            color: var(--navy-sidebar);
            background-color: var(--gold);
            font-weight: 600;
            box-shadow: 0 4px 14px rgba(201, 168, 76, 0.25);
        }

        .nav-link-custom.active .nav-icon {
            color: var(--navy-sidebar);
        }

        .nav-icon {
            font-size: 1.15rem;
            transition: var(--transition-smooth);
        }

        .sidebar-footer {
            padding: 1.5rem;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }

        .admin-profile {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 1rem;
        }

        .admin-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background-color: var(--gold);
            color: var(--navy-sidebar);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 1.1rem;
        }

        .admin-info {
            line-height: 1.2;
        }

        .admin-name {
            font-weight: 600;
            color: white;
            font-size: 0.88rem;
        }

        .admin-role {
            font-size: 0.72rem;
            color: var(--gold);
            font-weight: 500;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        .btn-logout {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 0.65rem;
            background-color: rgba(239, 68, 68, 0.08);
            border: 1px solid rgba(239, 68, 68, 0.2);
            color: #ef4444;
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: 600;
            text-decoration: none;
            transition: var(--transition-smooth);
        }

        .btn-logout:hover {
            background-color: #ef4444;
            color: white;
        }

        /* Workspace Panel */
        .workspace {
            margin-left: 270px;
            flex-grow: 1;
            padding: 2.5rem;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        /* Top Bar */
        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 1.5rem;
            border-bottom: 1px solid var(--border-color);
        }

        .topbar-title h1 {
            font-family: var(--font-display);
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--navy-dark);
            margin: 0;
        }

        .topbar-title p {
            color: var(--text-muted);
            margin: 0.25rem 0 0 0;
            font-size: 0.88rem;
        }

        .btn-gold {
            background: var(--gold);
            color: var(--navy-sidebar);
            border: none;
            font-weight: 700;
            font-size: 0.875rem;
            border-radius: 10px;
            padding: 0.65rem 1.5rem;
            transition: var(--transition-smooth);
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 4px 14px rgba(201, 168, 76, 0.2);
        }

        .btn-gold:hover {
            background: var(--gold-hover);
            color: white;
            transform: translateY(-2px);
        }

        /* Card Section */
        .dashboard-card {
            background: white;
            border-radius: 16px;
            padding: 1.8rem;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.02);
            border: 1px solid var(--border-color);
        }

        /* Form Controls */
        .form-label {
            font-size: 0.78rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-muted);
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        .form-control,
        .form-select {
            border: 1.5px solid var(--border-color);
            border-radius: 8px;
            padding: 0.65rem 0.9rem;
            font-size: 0.875rem;
            font-family: var(--font-sans);
            transition: var(--transition-smooth);
        }

        .form-control:focus,
        .form-select:focus {
            border-color: var(--gold);
            box-shadow: 0 0 0 3px rgba(201, 168, 76, 0.15);
        }

        /* Table Styling */
        .table {
            font-size: 0.875rem;
        }

        .table thead th {
            background: var(--navy-sidebar);
            color: white;
            font-weight: 600;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border: none;
            padding: 1rem;
        }

        .table thead th:first-child {
            border-radius: 10px 0 0 0;
        }

        .table thead th:last-child {
            border-radius: 0 10px 0 0;
        }

        .table tbody td {
            padding: 1rem;
            border-color: #f1f5f9;
            vertical-align: middle;
            color: var(--text-main);
        }

        .table tbody tr:hover {
            background: #f8fafc;
        }

        .status-badge-sm {
            display: inline-block;
            font-size: 0.7rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            padding: 4px 12px;
            border-radius: 20px;
            text-transform: uppercase;
        }

        .s-available {
            background: #d1fae5;
            color: #065f46;
        }

        .s-maintenance {
            background: #fee2e2;
            color: #991b1b;
        }

        .s-occupied {
            background: #fff3cd;
            color: #856404;
        }

        .action-btn {
            border: none;
            cursor: pointer;
            font-size: 0.75rem;
            font-weight: 600;
            padding: 6px 12px;
            border-radius: 8px;
            transition: var(--transition-smooth);
            margin: 2px;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }

        .action-btn:hover {
            opacity: 0.9;
            transform: translateY(-1px);
        }

        /* Modal Redesign */
        .modal-content {
            border-radius: 16px;
            border: none;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
        }

        .modal-header {
            background: var(--navy-sidebar);
            color: white;
            border-radius: 16px 16px 0 0;
            padding: 1.5rem;
            border: none;
        }

        .modal-title {
            font-family: var(--font-display);
            font-size: 1.2rem;
            font-weight: 600;
        }

        .modal-header .btn-close {
            filter: invert(1);
        }

        .modal-body {
            padding: 2rem;
        }

        /* Animations */
        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(12px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .animated {
            animation: fadeUp 0.4s ease both;
        }

        @media (max-width: 991px) {
            .sidebar {
                width: 70px;
            }
            .brand-text, .admin-info, .sidebar-footer span, .btn-logout span {
                display: none;
            }
            .workspace {
                margin-left: 70px;
                padding: 1.5rem;
            }
        }
    </style>
</head>

<body>

    <div class="dashboard-container">
        <!-- Sidebar Navigation -->
        <div class="sidebar">
            <div class="sidebar-brand">
                <div class="brand-icon"><i class="bi bi-building"></i></div>
                <div class="brand-text">Lumière</div>
            </div>

            <div class="sidebar-nav">
                <a href="/admin" class="nav-link-custom">
                    <i class="bi bi-speedometer2 nav-icon"></i>
                    <span>Overview</span>
                </a>
                <a href="/admin/rooms" class="nav-link-custom active">
                    <i class="bi bi-door-open nav-icon"></i>
                    <span>Manage Rooms</span>
                </a>
                <a href="/admin/bookings" class="nav-link-custom">
                    <i class="bi bi-calendar-check nav-icon"></i>
                    <span>Bookings</span>
                </a>
                <a href="/" class="nav-link-custom" style="margin-top: auto;">
                    <i class="bi bi-globe nav-icon"></i>
                    <span>Go to Website</span>
                </a>
            </div>

            <div class="sidebar-footer">
                <div class="admin-profile">
                    <div class="admin-avatar" id="avatarLetter">A</div>
                    <div class="admin-info">
                        <div class="admin-name" id="adminNameDisplay">Admin User</div>
                        <div class="admin-role">Hotel Manager</div>
                    </div>
                </div>
                <a href="#" id="logoutBtn" class="btn-logout">
                    <i class="bi bi-box-arrow-right"></i>
                    <span>Logout</span>
                </a>
            </div>
        </div>

        <!-- Main Workspace -->
        <div class="workspace">
            <!-- Topbar Header -->
            <div class="topbar animated">
                <div class="topbar-title">
                    <h1>Manage Rooms</h1>
                    <p>Configure room rates, statuses, details, and dynamic imagery</p>
                </div>
                <button class="btn btn-gold btn-sm" data-bs-toggle="modal" data-bs-target="#addRoomModal">
                    <i class="bi bi-plus-lg"></i>Add New Room
                </button>
            </div>

            <!-- Manage Rooms Table Card -->
            <div class="dashboard-card animated" style="animation-delay: 0.1s;">
                <div class="table-responsive">
                    <table class="table table-hover rounded overflow-hidden">
                        <thead>
                            <tr>
                                <th>Room No</th>
                                <th>Type</th>
                                <th>Price (LKR)</th>
                                <th>Status</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="roomsTableBody">
                            <tr>
                                <td colspan="5" class="text-center py-4 text-muted">
                                    <div class="spinner-border spinner-border-sm text-warning me-2"></div>Loading rooms...
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- Add Room Modal -->
    <div class="modal fade" id="addRoomModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title"><i class="bi bi-plus-circle me-2"></i>Add a New Room</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="addRoomForm">
                        <div class="row g-3">
                            <div class="col-md-4 col-6">
                                <label class="form-label">Room Number</label>
                                <input type="text" id="room_number" class="form-control" placeholder="e.g. 105" required>
                            </div>
                            <div class="col-md-4 col-6">
                                <label class="form-label">Room Type</label>
                                <select id="room_type" class="form-select" required>
                                    <option value="Single">Single</option>
                                    <option value="Double">Double</option>
                                    <option value="Family">Family</option>
                                    <option value="Suite">Suite</option>
                                </select>
                            </div>
                            <div class="col-md-4 col-12">
                                <label class="form-label">Price per Night (LKR)</label>
                                <input type="number" id="room_price" class="form-control" placeholder="15000" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Upload Image</label>
                                <input type="file" id="room_image" class="form-control" accept="image/*">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Or Image URL</label>
                                <input type="text" id="room_image_url" class="form-control" placeholder="https://...">
                            </div>
                            <div class="col-12">
                                <label class="form-label">Description</label>
                                <input type="text" id="room_desc" class="form-control" placeholder="Ocean-view room with king bed..." required>
                            </div>
                            <div class="col-12 mt-4">
                                <button type="submit" class="btn btn-gold w-100 justify-content-center py-2">
                                    <i class="bi bi-plus-lg me-2"></i>Add Room
                                </button>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Edit Room Modal -->
    <div class="modal fade" id="editRoomModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title"><i class="bi bi-pencil me-2"></i>Edit Room</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="editRoomForm">
                        <input type="hidden" id="edit_room_id">
                        <div class="mb-3">
                            <label class="form-label">Price per Night (LKR)</label>
                            <input type="number" id="edit_room_price" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Description</label>
                            <input type="text" id="edit_room_desc" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Update Image (Optional)</label>
                            <input type="file" id="edit_room_image" class="form-control" accept="image/*">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Or Image URL</label>
                            <input type="text" id="edit_room_image_url" class="form-control" placeholder="https://...">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Room Type</label>
                            <select id="edit_room_type" class="form-select" required>
                                <option value="Single">Single</option>
                                <option value="Double">Double</option>
                                <option value="Family">Family</option>
                                <option value="Suite">Suite</option>
                            </select>
                        </div>
                        <div class="mb-4">
                            <label class="form-label">Status</label>
                            <select id="edit_room_status" class="form-select" required>
                                <option value="Available">Available</option>
                                <option value="Maintenance">Maintenance</option>
                            </select>
                        </div>
                        <button type="submit" class="btn btn-gold w-100 justify-content-center py-2">
                            <i class="bi bi-check2-circle me-2"></i>Update Room
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="rooms.js"></script>
</body>

</html>
