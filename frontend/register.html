<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hotel Management - Register</title>
    <link rel="stylesheet" href="css/register.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>

<body>

    <div class="container">
        <h2>Customer Registration</h2>

        <!-- Form eka -->
        <form id="registerForm">
            <label>Full Name:</label>
            <input type="text" id="full_name" required>

            <label>Email Address:</label>
            <input type="email" id="email" required>

            <label>Password:</label>
            <input type="password" id="password" required>

            <label>Identity Type:</label>
            <select id="identity_type">
                <option value="NIC">NIC (National Identity Card)</option>
                <option value="Passport">Passport</option>
            </select>

            <label>Identity Number:</label>
            <input type="text" id="identity_number" required>

            <button type="submit">Register</button>
        </form>

        <!-- Message eka pennana thena -->
        <div id="message"></div>
    </div>

    <!-- Footer Section -->
    <footer style="background-color: #333; color: white; text-align: center; padding: 20px; margin-top: 40px;">
        <p>&copy; 2026 Luxury Hotel Management. All rights reserved.</p>
        <p>Email: contact@luxuryhotel.com | Phone: +94 77 123 4567</p>
        <p>123 Ocean Drive, Colombo, Sri Lanka</p>
    </footer>

    <!-- JS file eka link kirima -->
     <script src="js/common.js"></script>
    <script src="js/auth.js"></script>
</body>

</html>
