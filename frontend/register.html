<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumière Hotel — Register</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root {
            --navy: #0d1b2a;
            --gold: #c9a84c;
            --gold-light: #e8c97e;
        }
        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--navy);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .page-wrap {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 5rem 1rem 2rem;
            position: relative;
        }
        .page-wrap::before {
            content: '';
            position: fixed;
            inset: 0;
            background: radial-gradient(ellipse at 90% 90%, rgba(201,168,76,0.07) 0%, transparent 50%);
            pointer-events: none;
        }
        .auth-card {
            background: white;
            border-radius: 20px;
            width: 100%;
            max-width: 500px;
            overflow: hidden;
            box-shadow: 0 40px 80px rgba(0,0,0,0.4);
            animation: slideUp 0.5s ease both;
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .auth-header {
            background: var(--navy);
            padding: 2.5rem 2rem 2rem;
            text-align: center;
            border-bottom: 2px solid var(--gold);
        }
        .auth-logo {
            font-family: 'Playfair Display', serif;
            color: var(--gold);
            font-size: 1.8rem;
            margin-bottom: 0.25rem;
        }
        .auth-header p { color: #8a9ab0; font-size: 0.85rem; margin: 0; }
        .auth-body { padding: 2rem; }
        .form-label {
            font-size: 0.78rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #64748b;
            font-weight: 500;
            margin-bottom: 0.4rem;
        }
        .form-control, .form-select {
            border: 1.5px solid #e2e8f0;
            border-radius: 8px;
            padding: 0.7rem 1rem;
            font-size: 0.9rem;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .form-control:focus, .form-select:focus {
            border-color: var(--gold);
            box-shadow: 0 0 0 3px rgba(201,168,76,0.15);
        }
        .input-group-text {
            background: #f8fafc;
            border: 1.5px solid #e2e8f0;
            border-radius: 8px 0 0 8px;
            color: #94a3b8;
        }
        .input-group .form-control, .input-group .form-select {
            border-left: none;
            border-radius: 0 8px 8px 0;
        }
        .input-group:focus-within .input-group-text { border-color: var(--gold); }
        .btn-gold {
            background: var(--gold);
            color: var(--navy);
            border: none;
            font-weight: 700;
            font-size: 0.9rem;
            border-radius: 8px;
            padding: 0.8rem;
            transition: background 0.2s, transform 0.15s;
            width: 100%;
        }
        .btn-gold:hover { background: var(--gold-light); color: var(--navy); transform: translateY(-1px); }
        .auth-footer {
            padding: 1.25rem 2rem;
            background: #f8fafc;
            text-align: center;
            font-size: 0.875rem;
            color: #64748b;
            border-top: 1px solid #e2e8f0;
        }
        .auth-footer a { color: var(--gold); font-weight: 600; text-decoration: none; }
        .top-bar {
            position: fixed;
            top: 0; left: 0; right: 0;
            padding: 1rem 2rem;
        }
        .top-bar a {
            color: #8a9ab0; text-decoration: none;
            font-size: 0.85rem; display: flex; align-items: center; gap: 0.4rem;
            transition: color 0.2s;
        }
        .top-bar a:hover { color: var(--gold); }
        footer {
            background: rgba(0,0,0,0.3);
            color: #4a6280;
            text-align: center;
            padding: 1.25rem;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>

<div id="header-placeholder"></div>

<div class="page-wrap">
    <div class="auth-card">
        <div class="auth-header">
            <div class="auth-logo"><i class="bi bi-building me-2"></i>Lumière</div>
            <p>Create your account to start booking</p>
        </div>
        <div class="auth-body">
            <form id="registerForm">
                <div class="mb-3">
                    <label class="form-label">Full Name</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-person"></i></span>
                        <input type="text" id="full_name" class="form-control" placeholder="John Perera" required>
                    </div>
                </div>
                <div class="mb-3">
                    <label class="form-label">Email Address</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                        <input type="email" id="email" class="form-control" placeholder="you@example.com" required>
                    </div>
                </div>
                <div class="mb-3">
                    <label class="form-label">Password</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-lock"></i></span>
                        <input type="password" id="password" class="form-control" placeholder="Min. 8 characters" required>
                    </div>
                </div>
                <div class="row g-3 mb-3">
                    <div class="col-5">
                        <label class="form-label">Identity Type</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-card-text"></i></span>
                            <select id="identity_type" class="form-select">
                                <option value="NIC">NIC</option>
                                <option value="Passport">Passport</option>
                            </select>
                        </div>
                    </div>
                    <div class="col-7">
                        <label class="form-label">Identity Number</label>
                        <input type="text" id="identity_number" class="form-control" placeholder="e.g. 982561234V" required>
                    </div>
                </div>
                <button type="submit" class="btn-gold mt-2">
                    <i class="bi bi-person-plus me-2"></i>Create Account
                </button>
            </form>
            <div id="message" class="mt-3"></div>
        </div>
        <div class="auth-footer">
            Already have an account? <a href="/login">Sign in &rarr;</a>
        </div>
    </div>
</div>

<div id="footer-placeholder"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/common.js"></script>
<script src="js/auth.js"></script>
</body>
</html>
